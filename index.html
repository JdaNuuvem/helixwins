<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HelixWin — Gire e Ganhe</title>
  <meta name="description" content="Jogue Helix Jump e transforme suas habilidades em dinheiro real." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
  <script>
  // Kwai Pixel stub mínimo (loader limpo, carrega events.js sob demanda via kwaiq.load)
  (function(w, d) {
    var k = w.kwaiq = w.kwaiq || [];
    var methods = ["page","track","identify","instances","debug","on","off","once","ready","alias","group","enableCookie","disableCookie"];
    methods.forEach(function(m) {
      k[m] = function() { k.push([m].concat([].slice.call(arguments))); };
    });
    k.load = function(id) {
      var s = d.createElement('script');
      s.async = true;
      s.src = 'https://s21-def.ap4r.com/kos/s101/nlav112572/pixel/events.js?sdkid=' + encodeURIComponent(id) + '&lib=kwaiq';
      (d.head || d.getElementsByTagName('head')[0]).appendChild(s);
    };
  })(window, document);
  </script>
  <script>
  fetch('/api/public/config?_=' + Date.now())
    .then(function(r) { return r.json(); })
    .then(function(cfg) {
      var id = cfg.kwai_pixel_id;
      if (id) { kwaiq.load(id); kwaiq.page(); }
    })
    .catch(function() {});
  </script>
</head>
<body>
  <!-- Loading global -->
  <div id="global-loading" class="global-loading hidden">
    <div class="loading-spinner"></div>
  </div>

  <!-- Toast container -->
  <div id="toast-container" class="toast-container"></div>

  <div id="app">
    <section id="page-landing"  class="page"></section>
    <section id="page-login"    class="page"></section>
    <section id="page-cadastro" class="page"></section>
    <section id="page-painel"   class="page"></section>
    <section id="page-jogo"     class="page"></section>
  </div>

  <!-- Utilitários antes de tudo -->
  <script src="/js/utils.js?v=20260502e"></script>
  <script src="/js/api.js?v=20260502e"></script>

  <!-- Páginas -->
  <script src="/js/pages/landing.js?v=20260502e"></script>
  <script src="/js/pages/login.js?v=20260502e"></script>
  <script src="/js/pages/cadastro.js?v=20260502e"></script>
  <script src="/js/pages/painel.js?v=20260502e"></script>
  <script src="/js/pages/jogo.js?v=20260502e"></script>

  <!-- Router — carregado por último -->
  <script src="/js/app.js?v=20260502e"></script>
</body>
</html>
